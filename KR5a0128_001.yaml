front:
  text: 黃帝陰符經集解卷上中下同卷
  hash: sha256:f2e4cf1322a745ec1cccf243c8a2c14412e265da64083b5cf171ec160e6b1820
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0128_HFL_001-001a, image: hfl/0058/0058-140.png}
body:
  text: 朝散郎行潭州長沙縣主簿袁淑真集解神仙抱一演道章經曰觀天之道執天之行盡矣淑真曰但觀天之道而理執天之道而行則陰陽動靜之宜盡矣天者陰陽之精氣也輕清者上浮為天陰之精氣重濁者下沉為地天地相連而不相離故列子禦寇謂杞國人曰天積氣耳地積塊耳自地已上則皆天也子終日行於天中奈何憂天崩乎故知天地則陰陽之二氣氣中有子名曰五行者陰陽之動用也萬物才而生焉萬物則五行之子也故使人觀天地陰陽之道執天之五氣而行則興廢可知生死可察除此之外更無可觀執故言盡矣經曰故天有五賊見之者昌五賊在心施行于天宇宙在乎手萬化生乎身淑真曰天生五行謂之五賊使人用心觀執奉天而行則宇宙在乎掌中萬物生乎身上五賊者五行之氣也則金木水火土焉吕望注云聖人謂之五賊天下謂之五德人食五味而死無有怨而棄之者此五賊之義也袁氏曰所言賊者害也逆之不順則與人為害故曰賊也此言陰陽之中包含五氣故云天有五賊此者在天為五星在地為五嶽在位為五方在物為五色在聲為五音在食為五味在人為五臟在道為五德不善用之則為賊也賊者五行更相制伏遞為生煞晝夜不停亦能盜竊人之生死萬物成敗故言賊也人但能明五行制伏之道審陰陽興廢之源則而行之為見也如此實五藏善能用之則為福德而昌盛也又人能知五賊者何也在其心故言五賊在心心既知之使人用以觀執五氣而行睹逆順而不差合天機而不失則宇宙在乎手中萬物生乎身上如此則吉無不利與道同遊豈不為昌乎在履官之道執仁義禮智信則富貴榮盛豈不昌乎故曰見之者昌也但能依五行相生用之則為道德合於陽也相剋之道用之則為賊害合於陰也故三界天師皆用理世所立經教只言修善而稱道德不令修惡而稱賊害也故知善修道德者仙也是陽之主也陰惡賊害者魔也是陰之精除此之外虛廣其談也故宣尼云詩三百一言以蔽之曰思無邪易曰出其言善則千里之外應言不善則違此其至道也何必廣談修習者歟合道之體不在此間能知天地陰陽成敗之原者皆在此陰符首章而盡理矣世人見文少而言近不間理要而義深亦何啻三教經書廣博所陳也故驪山母云觀其精理黃庭八景不足以為學察其至要經傳子史不足以為文任其巧智孫吳韓白不足以為奇此其義也經曰天性人也人心機也立天之道以定人也淑真曰言以立天定人在乎五賊夫人心主魂之官身是神之府也將欲施行五賊者莫尚乎心故心能之事有所此圖必合天道此則宇宙雖廣觀覽只在手中萬物雖多生殺不出於術內則明天地不足貴以遠厚而況耳目之前乎故曰心正可以辟邪經曰天發殺機龍蛇超陸人發殺機天地反覆天人合發萬變定機淑真曰天發殺機公道也人發殺機私情也龍蛇感公道而震超私情紊天地而反覆俱合於公道則千萬化無不定矣天含五氣遞為生殺自然有之天道生殺皆合其機宜不妄動陰陽變化時代遷謝去故就新此天發殺機皆至公也乘天威殺之機或龍或蛇沉隱之類皆能震超於陵陸順天應時暢達於其間為乘天之機不失其宜也人發殺機天地反覆者人是五行之子須順五氣之生殺任陰陽之陶運何得擅自興其生殺乎至如世間之法殺人者死殺生者罪何也為非天之合殺彼人奈何敢殺之乎言人不合妄動殺機也至若姦臣逆節違背天道反叛君親恣行凶惡損害於世擅行屠戮妄動殺機者有何翻天作地覆地作天如此之大亂為逆天之大禍是名天地反覆此則人怨神怒天將誅之人共殺之有失天地之聖君若天人俱合其殺機則是名天人合發萬變定機也伐叛討逆順天行誅皆合天之機宜愜至公之正道則萬物咸伏無敢妄動是名定機君臣之道貴其公正若能動用合其天機應用同其天道此即天人合發奚為由此則人安其心物安其體五行安其位嶽瀆安其靈上施道德下符禮義災害不生禍亂不作天人靜默名曰天機經曰性有巧拙可以伏藏淑真曰人之巧拙不可顯露慎言擇善無使患生也人懷性智巧拙賢愚悉共有之但少而言也至如凡情之人有少巧智辨慧便馳騁顯露不料得失反招其咎者何也為不隱密不誡慎以致於傾敗耳德經曰大辨若訥大巧若拙言隱密也周易曰君不密則失臣臣不密則失身機事不密則害成由斯之謂也伏藏者賢人君子縱有巧智辨慧之性博學多聞之才動靜合於機宜可不為巧乎常能伏藏隱密巨細用之恐被嫉姤讒毁反招其咎況愚拙之人自率於心造次興動不自藏隱立招患咎賢人養道育德巧拙之性俱隱於身然後內觀正性外鄙邪淫善即行之不善損之修身鍊行而成聖人外人安能知我巧拙之性乎皆謂我天然賢聖不知修鍊而致之故曰可以伏藏也經曰九竅之邪在乎三要可以動靜淑真曰言人九竅俱皆能生患在於要耳目口也今誡慎無令禍生莊生云人有百骸九竅六腑體而存焉人稟五氣而成頭圓足方四肢五臟三魂七魄遞生邪正互為君臣在身通流運動者九竅也邪正禍福之急者在三要焉即眼耳口也道經曰五色令人目盲五音令人耳聾五味令人口爽是也道德之士眼不視邪色耳不聽邪聲口不談邪事所有正事則視聽言談之此名動也涉其邪忘悉不將心視聽言説此名靜也宣尼云擇其善者而從之此名動也擇不善者而改之此名靜也孝經云言滿天下無口過行滿天下無怨惡者所緣身心正而無邪惡以致此也但遇善則動逢邪則靜此則身無禍患皆在眼耳口固慎故云在乎三要可以動靜也經曰火生於木禍發必剋姦生於國時動必潰知之修鍊謂之聖人淑真曰姦火喻人之性木國喻人之身使人理國安身令姦火不發然後修身鍊行而成聖人也此一科聖意興其喻也為上文九邪三要動靜之宜切令誡慎恐未能窮理盡性故興此火木姦國為喻令殷勤修鍊以成聖人言木有火者喻人身中有邪惡之性五毒之火也吕望注云廣成子以為積火焚五毒故知火者猛烈之氣書云火炎崑岡玉石俱焚矣木中有火慎勿鑽研火發則木焚矣身中邪毒慎勿縱恣之則萬善俱滅其身潰矣姦生於國時動必潰者凡有此國其中别有姦人賊臣包禍以思國也篡奪苟謀富貴如此之類不一皆潛藏於國中君不可知之但君懷道德臣效忠良時和俗阜天下寧泰姦人縱有心無由妄敢興動皆候其時合動始動安得君道失臣道喪兵水旱蝗徵斂苛剋人心變易思亂怨上當此之代萬物皆有亂心何況懷姦之人奈何不動乎又姦者不一來此隳敗之時諸姦競發其國安得不潰乎此喻上之九邪三要巧拙動靜也言人有道德定慧隱在身心之中諸邪淫穢僻亦不能興動矣若邪淫競發則身潰矣故以姦火藏於木國喻邪正伏隱於身心此喻賢智之士通詳其文曉達明悟精念至道去惡存善是名知之修鍊謂之聖人故曰上有神仙抱一之道又諸葛孔明云聖人藏之於心陶甄天地黃帝是也賢人學得其法淑真曰為五行之善政不違天時不逆地理不傷時不害物富國安人身為賢明乃得其法道德之君堯舜是也智人學之得其術淑真曰用天之道分地之利謹身節用以養父母仁義禮智信忠孝君親貞廉不失保其祿位是得其術賢臣夔龍等是也小人學之得其殃淑真曰為將天道五行之氣不思習善之用以巧智辨慧之性專事三反晝夜煩兵黷武陰謀屠害苟求奢榮傾奪於在世雖暫得富貴不思禍患將至反招亡敗延及後世是得其殃祿山思明古今篡逆悖亂之臣等是也聖母又言此文深奧若巨海之朝百谷也此神仙抱一演道章上一百五言皆使人明陰陽之道察興廢之理動用各得其宜然後修身鍊行以成聖人矣黃帝陰符經集解卷上
