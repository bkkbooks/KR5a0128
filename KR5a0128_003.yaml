body:
  text: 散郎行潭州長沙縣主簿袁淑真集解強兵戰勝演術章經曰瞽者善聽聾者善視絶利一源用師十倍三反晝夜用師萬倍淑真曰絶利者塞耳則視明閉目則聽審務使身心不亂主事精專也言人眼貪視邪色則不聞正聲耳貪聽邪聲則目不睹正色此視聽二途俱主於心也道德之士心無邪妄雖耳目聞見萬種聲色其心正定都無愛悅貪著之心與無耳目不殊何必在於聾瞽者也但心納正則耳目無邪耳目無邪則身心不亂身心不亂則思慮白思慮白則舉事發機皆合天道比凡情十倍利益事皆成遂何必獨用師也他皆倣此三反晝夜用師萬倍者言上之身正定耳目聰明舉事發機比常情十倍就中更能三思反覆日夜精專舉事發機比常情萬倍何必獨用師也宣尼云三思而後行再斯而可矣使人用心必須精審此義也言師者兵也兵者凶器戰者危事處戰爭之地危亡之際必須三反精思深謀遠慮若寡於謀慮輕為進退立見敗亡所以將此耳目精恩别以為師喻切今修鍊保固其身非真用師也且道德之士嫉惡如讎敵者賊也賢人知此耳目絶利之源三反精思之義深沉審細理正居貞誅鋤邪妄之賊自固其躬久久成道也則黃帝滅蚩尤是也至如古今名將孫吳韓白武侯諸葛衛公李靖皆善用師悉能三反晝夜成功立事是以致君堯舜之階成身於榮華之地然後謂強兵戰勝之術以為輕命之機必也黃帝得之以登雲天傳説以處玄枵之望矣故上文云君子得之固躬小人得之輕命是也經曰心生於物死於物機在目淑真曰心貪於物者損壽目睹無厭則意荒但能誡目收心則無禍敗之患也是道德之士心不妄生機不妄動輒加於物情而耽徇之人取萬物資身養命者亦天然之理但不令越分乖宜反傷其性也故亢倉子云萬人操弓共射一招招無不中招垛也亦云招箭人也萬物彰彰以害一生生無不傷者性命也今代之惑者多以性養物則不知休息也此言心生貪婪於物則反為物所盜使人禍敗也故家語云嗜欲無厭貪求不至者形其煞之老子云知足不辱知止不殆可以長久所貴知足適其中道不得將以耽養於物反傷正性必害於人此乃心生於物也機在目者言人動生妄心於物者皆由目睹而心生故云機在目欲令誡慎其目勿令妄視邪淫之色使心於物不生妄動之機不撓平和之性以保壽固躬也經曰天之無恩而大恩生淑真曰天地生而不有為而不恃生長萬物不求恩報而萬物感其覆育自有恩生也天地萬物自然有之此皆至道之所含育不求恩報於萬物萬物承天之覆育自懷恩於天地也故老子云生而不有為而不恃長而不宰也經曰迅雷烈風莫不蠢然淑真曰迅雷烈風陰陽動用人自懷懼蠢然而驚也迅雷者陰陽擊搏之聲烈風者莊生云大塊噫氣其名為風也凡此風雷陰陽自有本不威人人自畏之莫不蠢然而動懷驚懼也言道德之君撫育萬靈同天地之不仁則人民禽獸草木皆自歸恩於君感戴如天各守其分各安其業無不逍遙也明君但施其正令以示國章兆人睹其威令如迅雷烈風莫不蠢然而動咸恐懼之心各自警誡修身慎行也以此理軍則將勇兵強上威下懼必能誅暴定亂故云下有強兵戰勝之術也經曰至樂性餘至靜則廉淑真曰志尚廉靜心無憂懼情懷悅樂而逍遙有餘也至樂者非絲竹歡娛之樂也若以此樂性必無餘故家語云至樂無聲而天下之安三略云有道之君以樂樂人此言賢人君子以不顧於物不徇於財貨則理國安家無淫刑罰不越國章身無過犯無所憂懼自然心懷悅逸情性怡懌逍遙有餘豈將絲竹歡宴之樂而方作乎至如古人鼓琴拾穗行歌待終故曰至樂性餘也至靜則廉者既不為小人絲竹奢淫之樂自保其無憂無事之歡如此則不為聲色所撓而性靜逸神貞至廉也故亢倉子云貴則語通富則身通窮則意通靜則神通此四通之體義存乎至靜者也人能至靜可致神通是名至靜則廉也夫將師之體貴其廉靜杜其喧撓賞罰不差父子為軍心懷悅樂性多餘勇然可摧凶剋敵功業必成故曰下有強兵戰勝之術也經曰天之至私用之至公淑真曰天道是出隱不可窺側至私也萬物生成聖功顯著至公也天者至道也言道包含萬類幽深恍惚無有形段不可窺側是名至私私者隱匿之義也能於杳冥之中應用無窮生成萬物各具形體隨用立名乃至公也公者明白顯用衆可觀覩之義也此言道德之君心慮廣博包物萬機智謀巧拙進退可否悉私隱於深心人不可得而窺之是至私也乃至動用觀善惡察是非施政令行賞罰顯然明白為天下之可觀乃至公也故曰天之至私用之至公也為軍將之體能用心隱密機必難窺取捨如神威恩顯上清下正明將勇兵強剋敵摧凶功業茂盛故云下有強兵戰勝之術也經曰禽之制在氣淑真曰鵬摶九萬積氣而升蜩鳩槍榆決起而下皆制氣進退自由也禽者羽化百鳥之類也氣者天地元和之氣也人之運動皆以手足進退為利禽鳥運動皆以翅鼓氣以心進退翱翔雲霄人不如也言鳥在空中尚能乘制元和之氣心動翅鼓無所不之上下由己況人言最靈不能善用天地道德之氣固躬養命以至長生久視乎若人善能制道德之氣則遨遊太虛大羅兜率禽鳥不足方也為軍師之體善用五行休王之氣能知陰陽制伏之源則摧凶剋敵不足為難故云下有強兵戰勝之術也經曰生者死之根死者生之根淑真曰愚人徇物以貪生為生之理者促壽也賢人損己以求生道德真妙者固躬而不亡此言人之在世貪生而惡死皆自厚養其身恐致滅亡也鞠育身命必須飲食衣服此亦天然自合之理故莊周云耕而食織而衣其德不離織而衣耕而食是謂同德故知人生資衣食之育養也然在儉約處中則吉若縱恣奢溢過分則凶而反害其生也至若上古之人巢居穴處情性質朴亦不知有長生短壽之理任自然之道而年壽長永及後代真源道喪浮薄將興廣設華宇衣服紈綵滋味膳肴越分怡養恐身之不康殊不知養生太過役心損慮為促壽之根故曰生者死之根也死者生之根至如道德之士損己忘軀不貪財不徇物以求長生之術或則餐霞服氣辟穀休糧心若死灰形同稿木世人觀之死之象也殊不知此長生之根耳故曰死者生之根也夫將師之體能知幸生而必死畢命而反生者則全軍保衆為良將焉故兵術曰致兵於死地而反生此強兵戰勝之術也經曰恩生於害害生於恩淑真曰君子免害而感恩恩生於害也小人辜恩而起害害生於恩耳此言人心向背恩害互生本來無害元亦無恩因救害而有恩即恩生於害也至如賢人君子小人有危滯得人濟拔懷恩感德終身不忘是恩生於害也至如小人承君上恩顧身居榮祿不能保守恩德誡慎始終一朝恃寵失權身陷刑網不知己過反生怨害之心此辜恩而起害故曰害生於恩也道德之士感天地覆育之恩不辜至道生成之德修行善政反朴還源則無害可生於恩亦無由生害不將恩害撓性守靜默以生真利至如恩害相生寵辱更致者小人之見也為將師之體不負皇恩不憍榮寵慎終如始保守恩光竭力盡忠成功立事恩亦無由生害害亦無由而起於恩以道德臨戎有征無戰故云下有強兵戰勝之術也經曰愚人以天地文理聖我以時物文理哲淑真曰愚人見星流日暈風電雷霆水旱災蝗而生憂懼不知有道德政教淳和安撫黎民轉禍為福以此時物文理惟聖我知之矣天地文理者天地懸日月以照善惡垂列宿以示吉凶皆道體自然之理也言愚人仰視三光觀天文之變異睹雷霆之震怒或寒暑不節水旱災蝗恐之反身悉懷憂懼也愚人以此時物文理時物文理者但君懷廉靜臣效忠貞獹鵲不喧邊烽無燧兆人安樂寰宇清平縱天地災祥無能為也聖我以為時物文理者故家語云殷太戊之時道缺法邪以致之亡孽桑穀忽生於朝七日大拱占者曰桑穀合生於郊今生於朝恐朝亡矣太戊恐懼側身修德思先王之政布養人之道三年之後遠方慕義重譯而至十有六國則桑穀無能為災夫子曰存亡禍福皆由人興天災地妖不能加也則災妖不勝善政怪夢不勝善行也又堯遭洪水湯遭大旱皆積有歲年兆庶和平人無飢者何也為君臣有道政理均和主信臣忠百姓戴上雖旱水不能為災也水旱者時物也若明時物之理者皆能轉禍為福易死為生故曰聖我以時物文理夫為軍體日暈五色星流四維怪獸衝營野鳥入室此時天地文理示其災祥但能修政令設謀慮恩撫士卒轉禍為福則敵何敢當此乃時物文理也故曰下有強兵戰勝之術章下一百三言皆使人深恩靜慮恩害不生曉達存亡公私隱密開物成務觀天相時故云下有強兵戰勝之術也經曰自然之道靜故天地萬物生天地之道浸故陰陽勝陰陽相推而變化順矣至靜之道律曆所不能契爰有奇器是生萬象八卦甲子神機鬼藏陰陽相勝之術昭昭乎進乎象矣黃帝陰符經集解卷下
