body:
  text: 黄帝陰符經集解序餘十一黄帝智窮恍惚思極窈㝠辯天人合變之機演陰陽動植之妙經云知之修鍊謂之聖人所言黄帝得之以登雲天信其明矣黄帝闡弘道義務欲救人或恐後來昧於修習乃簡集其要三百餘言洞啓眞源傳示於世賢人秘隱寔曰仙經世人相承俱謂兵法此經文少而義博詞近而理深先儒數賢並精注解義終省略使中士或存或亡洎乎唐隴西李筌尤加說釋亦不立章疏何以光暢玄文驪山母云陰符三百言百言演道百言演法百言演術又曰上有神仙抱一之道中有富國安人之法下有强兵戰勝之術聖母發明三體此乃三章顯然儒流因循然無分析今輒叙三章之要義以爲上中下三卷各述其本因義亦有等威先註略舉其綱宗後疏冀陳其周細非厠前賢之廣達聊申後學之寡文耳
