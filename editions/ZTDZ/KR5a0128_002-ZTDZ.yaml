  text: 黄帝陰符經集解卷中
  hash: sha256:fd390e0d6d54c313c5a0b41da9422d43c0aae219509145d864b0b717b60675ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0128_SJB_002-020849a, image: sjb/02/020849a.png}
body:
  text: 朝散郎行潭州長沙縣主簿袁淑眞集解富國安人演法章經曰天地萬物之盗淑眞曰天覆地載萬物潜生冲氣暗滋故曰盗也天地者陰陽也陰陽二字洎其五行共成其七此外更改於物則何惑之甚矣言天地萬物胎卵濕化百穀草木悉承此七氣而生長從無形而能生有形潜自滋育以成其體如行竊盗不覺不知天地亦潜與其氣應用無窮皆私納其覆育各獲其安故云天地萬物之盗也經曰萬物人之盗淑眞曰萬物盗天而生長人盗萬物以資身若知分合宜亦自然之理也人與禽獸草木俱禀陰陽而生爲人之最靈位處中宫心懷智度能反照正性窮達本始明會陰陽五行之氣則而用之今周易六十四卦六十甲子等是也故上文云見之者昌也人於此七氣之中所有生成之物悉能潜取資養其身故言曰盗則田蠶之類是也列子曰齊國氏大富云吾善爲盗也天有時地有利天地之時利盗雨澤之滂潤陸盗禽獸水盗魚鼈吾始爲盗一年而急二年而足三年大穰自此已後施及州閭吾盗天地而無殃咎汝盗人之金帛奈何無事辜乎萬物盗天地而生長國民盗萬物以資身但知分合宜亦自然之理此萬物人盗之義也經曰人萬物之盗三盗既宜三才既安淑眞曰既盡也三盗盡食其宜則三才盡安其位矣言人但能盗萬物資身以充榮富不知萬物反能盗人以生禍患言上來三義更相爲盗者亦自然之理者凡此相盗其中皆須有道愜其宜則吉乖其理則凶故列子云盗亦有道乎曰何適其無道也見室中藏聖也知可否智也入先勇也出後義也分均仁也無此五德而成大盗者未之有也此乃盗中之道向於三盗之中皆須有道令盡合其宜則三才不差盡安其位矣皆不令越分傷性以生禍患也經曰食其時百骸理動其機萬化安淑眞曰言人飲食不失其時則身無患咎興動合其機宜則萬化安矣言人理性命者皆謂飲食滋味也故左氏傳曰味以通氣氣以通志滋形潤神必歸飲食也黄帝曰人之服食必先五味五肉五菜五果皆須調候得所量體而進熟則益人生則傷臟此食時之義也故使人飲食不失其時滋味不越其宜適其中道不令乖分傷性則四肢調暢五臟安和不生疾患長壽保終豈不爲百骸理乎故亢倉子云冬飽則身温夏飽則身凉時適則人無疾人無疾則疫癘不行疫癘不行則人得終天年故曰穀者人之命也天是以興王務農王不務農是棄人也將何有國哉但三盗盡合其宜三才盡安其任此皆合自然之理然後須合明君賢臣調御於世乗此既宜盡安之時當須法令平正用賢使能澤及昆蟲化被草木舉動皆合天道之機宜則陰陽順時寰宇寧泰使萬化之類獲其安寧此則動其機而萬化安經曰人知其神而神不知不神所以神淑眞曰陰陽生成萬物人謂之神不知有至道靜嘿而不神能生陰陽萬物之至神矣神者妙而不側者也易曰陰陽不測之謂神人但見萬物從陰陽日月生謂之神殊不知陰陽日月從不神而生焉不神者何也至道也言至道虚靜寂嘿而不神此不神之中能生日月陰陽三才萬物敷榮而獲暢皆從此至道虚靜中來此乃不神爲至神矣故道經曰窈窈冥冥其中有精恍恍惚惚其中有物此乃至道不神之中而有至神之理明矣欲令修鍊之士明悟無爲不神之理反照正性修無爲之業存恩守一反樸還眞歸無爲之道玄之又玄方證寂嘿而不神然後能而不爲是名不神而已也故老子云道常無爲而無不爲此則不神而能至神矣經曰日月有數大小有定聖功生焉神明出焉淑眞曰日月運轉不差度數大小有定方顯聖功之力生焉神明之效出焉日月者陰陽之精氣也六合之内爲至尊者也日月度數大小律曆之所辯咸有定分運轉不差故云日月有數大小有定聖功生焉神明出焉者言六合之内賴此日月照燭陰陽運行而生萬物有動植功力深妙至聖故曰聖功生焉神明出焉者陰陽不測之謂神日月晶朗之謂明言陰陽至神日月至明故曰神明言天地萬物皆承聖功神明而生育從無出有功用顯著故曰神明出焉又言世間萬物皆禀此聖力而生大小有定分不相踰則小不愛大大不輕小故莊周云鵬鷃各自逍遥不相健羡此大小有定之義也又言上至王侯下及黎庶各依定分不相傾奪上下和睦俗稔時和名曰太平故云中有富國安人之法也經曰其盗機也天下莫不見莫能知君子得之固躬小人得之輕命淑眞曰盗機深妙易見而難知君子知積善之機乃固躬小人務榮辱之機而輕命盗機者重舉上文三盗之義也假如國氏盗天而獲富人皆是種植之機不知所獲之深理何名爲機縁己之先無知彼之先有暗設計謀而動其機數不知不覺竊盗將來以潤其己名曰盗機言天下之人咸共見此盗機而莫能知其深理設有知者在小人君子所見不同君子則知固躬之機小人則知輕命之機固躬之機若何君子知至道之中包含萬善所求必致如響應聲但設其善計暗嘿修行動其習善之機與道契合乃至守一存思精以修習竊其深妙以謹其性或盗神水華池玉英金液以致神仙賢人君子知此妙道之機修鍊以成聖入故曰君子得之因躬小人輕命之機者但務營求金帛不憚劬勞或修習才學武略不辭勞苦飾情巧智以求世上浮榮之機或奢華寵辱或軍旅傾危或貪婪損己或在財色禍生雖暫得浮榮終不免於患咎爲不知其妙道之機以致於此故曰小人得之以輕命也此富國安人演法章九十二言皆使人取捨合其機宜明察至神之理此其安化養命固躬之機也故曰中有富國安人之法黄帝陰符經集解卷中
